<!DOCTYPE html>
<html lang="he" dir="rtl">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<style>@import url('https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;700&display=swap');</style></head>
<body style="margin:0;padding:0;background:transparent;">
<div id="chart-container">
  <div id="chart-header">
    <div id="chart-title"></div>
    <div id="chart-select-wrap">
      <select id="chart-select">
        <option value="count">כמות עסקאות</option>
        <option value="cumulative">כמות מצטברת</option>
        <option value="price">מחיר למ״ר</option>
      </select>
      <div id="chart-select-hint">לחצו למעבר בין גרפים</div>
    </div>
  </div>
  <div id="chart-wrap"><canvas id="mainChart"></canvas></div>
  <div id="chart-tabs">
    <button class="chart-tab active" data-filter="all">הכל</button>
    <button class="chart-tab" data-filter="24">24 חודשים</button>
    <button class="chart-tab" data-filter="12">12 חודשים</button>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
(function(){
const CHARTS     = {{ data.charts | tojson }};
const font       = "'Heebo','Arial',sans-serif";
let chartInstance = null;
let currentKey    = "count";
let currentFilter = "all";

function getFilteredData(key) {
  const c = CHARTS[key];
  if (currentFilter === "all") return { labels: c.labels, data: c.data };
  const n = parseInt(currentFilter);
  return { labels: c.labels.slice(-n), data: c.data.slice(-n) };
}
function hexToRgba(hex, alpha) {
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}
function tooltipCallback(type) {
  if (type==="price")      return ctx=>" ₪"+ctx.raw.toLocaleString("he-IL");
  if (type==="cumulative") return ctx=>" "+ctx.raw.toLocaleString("he-IL")+" דירות (מצטבר)";
  return ctx=>" "+ctx.raw+" דירות";
}
function yTickCallback(type) {
  return type==="price" ? val=>"₪"+val.toLocaleString("he-IL") : val=>val;
}
function renderChart(key) {
  const c=CHARTS[key], fd=getFilteredData(key);
  document.getElementById("chart-title").textContent=c.title;
  const yScaleOptions={grid:{color:"#f0f0f0"},beginAtZero:true,
    ticks:{font:{family:font,size:11},callback:yTickCallback(c.tooltipType)}};
  if(c.yMax!=null){yScaleOptions.min=c.yMin;yScaleOptions.max=c.yMax;}
  if(chartInstance){
    chartInstance.data.labels=fd.labels;
    chartInstance.data.datasets[0].data=fd.data;
    chartInstance.data.datasets[0].label=c.title;
    chartInstance.data.datasets[0].borderColor=c.color;
    chartInstance.data.datasets[0].backgroundColor=hexToRgba(c.color,0.08);
    chartInstance.data.datasets[0].pointBackgroundColor=c.color;
    chartInstance.options.plugins.tooltip.callbacks.label=tooltipCallback(c.tooltipType);
    chartInstance.options.scales.y=yScaleOptions;
    chartInstance.update();
  } else {
    document.getElementById("chart-tabs").style.display="flex";
    chartInstance=new Chart(document.getElementById("mainChart"),{
      type:"line",
      data:{labels:fd.labels,datasets:[{label:c.title,data:fd.data,borderColor:c.color,
        backgroundColor:hexToRgba(c.color,0.08),borderWidth:2.5,pointRadius:3,pointHoverRadius:6,
        pointBackgroundColor:c.color,tension:0.3,fill:true}]},
      options:{responsive:true,maintainAspectRatio:false,animation:{duration:600,easing:"easeInOutQuart"},
        plugins:{legend:{display:false},title:{display:false},
          tooltip:{rtl:true,callbacks:{label:tooltipCallback(c.tooltipType)},bodyFont:{family:font},titleFont:{family:font}}},
        scales:{x:{grid:{color:"#f0f0f0"},ticks:{font:{family:font,size:10},maxRotation:45,minRotation:45}},
          y:yScaleOptions}}
    });
  }
}
renderChart(currentKey);
document.getElementById("chart-select").addEventListener("change",function(){
  this.classList.add("used");
  document.getElementById("chart-select-hint").style.display="none";
  if(this.value===currentKey)return;
  currentKey=this.value; renderChart(currentKey);
});
document.querySelectorAll(".chart-tab").forEach(btn=>btn.addEventListener("click",function(){
  currentFilter=this.dataset.filter;
  document.querySelectorAll(".chart-tab").forEach(b=>b.classList.remove("active"));
  this.classList.add("active");
  renderChart(currentKey);
}));
})();
</script>
<style>
  #chart-container{width:100%;min-height:480px;padding:22px 24px 20px;background:#fff;border-radius:14px;
    box-shadow:0 2px 18px rgba(0,0,0,0.07);font-family:'Heebo',Arial,sans-serif;direction:rtl;
    box-sizing:border-box;display:flex;flex-direction:column;}
  #chart-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;gap:16px;}
  #chart-title{flex:1;text-align:right;font-size:17px;font-weight:700;color:#222;line-height:1.4;}
  #chart-select-wrap{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;gap:5px;}
  #chart-select{width:auto;max-width:160px;padding:7px 12px;border:2px solid #ddd;border-radius:8px;
    background:#fff;color:#444;font-family:'Heebo',Arial,sans-serif;font-size:13px;font-weight:600;
    cursor:pointer;outline:none;direction:rtl;appearance:auto;-webkit-appearance:auto;
    animation:chart-select-pulse 2.4s ease-in-out infinite;}
  #chart-select.used{animation:none;border-color:#ddd;}
  #chart-select:hover,#chart-select:focus{border-color:#61C0CC;}
  #chart-select-hint{font-size:11px;font-weight:500;color:#61C0CC;text-align:center;white-space:nowrap;}
  @keyframes chart-select-pulse{0%{border-color:#ddd;background:#fff}50%{border-color:#61C0CC;background:#d6f0f3}100%{border-color:#ddd;background:#fff}}
  #chart-wrap{flex:1;position:relative;min-height:260px;}
  #chart-wrap canvas{position:absolute;top:0;left:0;width:100%!important;height:100%!important;}
  #chart-tabs{display:flex;justify-content:center;gap:16px;margin-top:12px;}
  .chart-tab{padding:3px 8px;border:none !important;background:none !important;color:#aaa;font-family:'Heebo',Arial,sans-serif;
    font-size:13px;cursor:pointer;border-radius:4px;outline:none;-webkit-appearance:none;appearance:none;box-shadow:none !important;}
  .chart-tab.active{color:#61C0CC !important;text-decoration:underline !important;font-weight:600;background:none !important;border:none !important;box-shadow:none !important;}
  .chart-tab:hover:not(.active){color:#555;background:#f0f0f0 !important;}
</style>
</body></html>
