<!DOCTYPE html>
<html lang="he" dir="rtl">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<style>@import url('https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;700&display=swap');</style></head>
<body style="margin:0;padding:0;background:transparent;">

<div id="rooms-container">
  <div id="rooms-header">
    <div id="rooms-title-wrap">
      <div id="rooms-title"></div>
      <div id="rooms-subtitle"></div>
    </div>
    <div id="rooms-select-wrap">
      <select id="rooms-select">
        <option value="price">מחיר ממוצע לדירה</option>
        <option value="size">שטח ממוצע</option>
        <option value="pricePerSqm">מחיר ממוצע למ"ר</option>
      </select>
      <div id="rooms-select-hint">לחצו למעבר בין גרפים</div>
    </div>
  </div>
  <div id="rooms-chart-wrap"><canvas id="roomsChart"></canvas></div>
  <div id="rooms-tabs">
    <button class="rooms-tab active" data-filter="all">הכל</button>
    <button class="rooms-tab" data-filter="24">24 חודשים</button>
    <button class="rooms-tab" data-filter="12">12 חודשים</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
(function(){
  const ROOMS_DATA = {{ data.rooms_charts | tojson }};
  const font = "'Heebo','Arial',sans-serif";

  function hexToRgba(hex, a) {
    const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
    return `rgba(${r},${g},${b},${a})`;
  }

  let inst = null, key = 'price', currentFilter = 'all';

  function fmtLbl(type, val) {
    if (type === 'price')       return val.toLocaleString('he-IL') + " מ' ₪";
    if (type === 'pricePerSqm') return val.toLocaleString('he-IL') + ' ₪';
    return val.toLocaleString('he-IL') + ' מ"ר';
  }
  function fmtTt(type, val) {
    if (type === 'price')       return ' ' + val.toLocaleString('he-IL') + ' מיליון ש"ח';
    if (type === 'pricePerSqm') return ' ' + val.toLocaleString('he-IL') + ' ש"ח למ"ר';
    return ' ' + val.toLocaleString('he-IL') + ' מ"ר';
  }

  const lblPlugin = {
    id: 'aboveBar',
    afterDatasetsDraw(chart) {
      const { ctx, data, scales: { x, y } } = chart;
      const type = ROOMS_DATA[key] ? ROOMS_DATA[key].tooltipType : 'price';
      ctx.save();
      ctx.font = 'bold 13px Heebo,Arial,sans-serif';
      ctx.fillStyle = '#222';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'bottom';
      data.datasets[0].data.forEach((val, i) => {
        ctx.fillText(fmtLbl(type, val), x.getPixelForValue(i), y.getPixelForValue(val) - 6);
      });
      ctx.restore();
    }
  };

  function render(k) {
    const c    = ROOMS_DATA[k];
    const vals = c.data[currentFilter];   // ← data is now {all, 24, 12}
    document.getElementById('rooms-title').textContent = c.title;
    document.getElementById('rooms-subtitle').innerHTML =
      c.subtitle + '<span style="color:#777;font-size:13px">, ללא עסקאות אופציה</span>';

    const yTick = c.tooltipType === 'price'
      ? v => v + " מ'"
      : c.tooltipType === 'pricePerSqm'
        ? v => (v / 1000).toLocaleString('he-IL') + 'K'
        : v => v + ' מ"ר';

    if (inst) {
      inst.data.labels                      = c.labels;
      inst.data.datasets[0].data            = vals;
      inst.data.datasets[0].backgroundColor = vals.map(() => hexToRgba(c.color, 0.85));
      inst.data.datasets[0].hoverBackgroundColor = vals.map(() => c.color);
      inst.options.plugins.tooltip.callbacks.label = ctx => fmtTt(c.tooltipType, ctx.raw);
      inst.options.scales.y.ticks.callback  = yTick;
      inst.options.scales.y.min = c.yMin ?? 0;
      inst.options.scales.y.max = c.yMax;
      inst.update();
    } else {
      inst = new Chart(document.getElementById('roomsChart'), {
        type: 'bar',
        plugins: [lblPlugin],
        data: {
          labels: c.labels,
          datasets: [{
            data: vals,
            backgroundColor:      vals.map(() => hexToRgba(c.color, 0.85)),
            hoverBackgroundColor: vals.map(() => c.color),
            borderRadius: 6,
            borderSkipped: false
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          layout: { padding: { top: 36 } },
          animation: { duration: 600, easing: 'easeInOutQuart' },
          plugins: {
            legend: { display: false },
            title:  { display: false },
            tooltip: {
              rtl: true,
              callbacks: { label: ctx => fmtTt(c.tooltipType, ctx.raw) },
              bodyFont:  { family: font },
              titleFont: { family: font }
            }
          },
          scales: {
            x: {
              grid: { display: false },
              ticks: { font: { family: font, size: 13, weight: '600' }, color: '#333' }
            },
            y: {
              grid: { color: '#f0f0f0' },
              beginAtZero: !c.yMin,
              min: c.yMin ?? 0,
              max: c.yMax,
              ticks: { font: { family: font, size: 11 }, callback: yTick }
            }
          }
        }
      });
    }
  }

  render(key);

  document.getElementById('rooms-select').addEventListener('change', function() {
    this.classList.add('used');
    document.getElementById('rooms-select-hint').style.display = 'none';
    key = this.value;
    render(key);
  });

  document.querySelectorAll('.rooms-tab').forEach(btn => {
    btn.addEventListener('click', function() {
      currentFilter = this.dataset.filter;
      document.querySelectorAll('.rooms-tab').forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      render(key);
    });
  });
})();
</script>

<style>
  #rooms-container {
    width:100%;min-height:480px;padding:22px 24px 20px;background:#fff;border-radius:14px;
    box-shadow:0 2px 18px rgba(0,0,0,0.07);font-family:'Heebo',Arial,sans-serif;direction:rtl;
    box-sizing:border-box;display:flex;flex-direction:column;
  }
  #rooms-header {display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;gap:16px;}
  #rooms-title-wrap {flex:1;text-align:right;}
  #rooms-title    {font-size:17px;font-weight:700;color:#222;line-height:1.4;}
  #rooms-subtitle {font-size:13px;color:#777;margin-top:3px;}
  #rooms-select-wrap {flex:0 0 auto;display:flex;flex-direction:column;align-items:center;gap:5px;}
  #rooms-select-hint {font-size:11px;font-weight:500;color:#61C0CC;white-space:nowrap;}
  #rooms-select {
    width:auto;padding:7px 12px;border:2px solid #ddd;border-radius:8px;background:#fff;color:#444;
    font-family:'Heebo',Arial,sans-serif;font-size:13px;font-weight:600;cursor:pointer;outline:none;
    direction:rtl;appearance:auto;-webkit-appearance:auto;animation:rooms-pulse 2.4s ease-in-out infinite;
  }
  #rooms-select.used   {animation:none;}
  #rooms-select:hover,
  #rooms-select:focus  {border-color:#61C0CC;}
  @keyframes rooms-pulse {
    0%   {border-color:#ddd;background:#fff}
    50%  {border-color:#61C0CC;background:#d6f0f3}
    100% {border-color:#ddd;background:#fff}
  }
  #rooms-chart-wrap {flex:1;position:relative;min-height:280px;}
  #rooms-chart-wrap canvas {position:absolute;top:0;left:0;width:100%!important;height:100%!important;}

  /* ── טאבי סינון — זהים לגרף הקווים ─────────────────────── */
  #rooms-tabs {display:flex;justify-content:center;gap:16px;margin-top:12px;}
  .rooms-tab{
    padding:3px 8px;border:none !important;background:none !important;color:#aaa;
    font-family:'Heebo',Arial,sans-serif;font-size:13px;cursor:pointer;
    border-radius:4px;outline:none;-webkit-appearance:none;appearance:none;box-shadow:none !important;
  }
  .rooms-tab.active{color:#61C0CC !important;text-decoration:underline !important;font-weight:600;background:none !important;border:none !important;box-shadow:none !important;}
  .rooms-tab:hover:not(.active){color:#555;background:#f0f0f0 !important;}
</style>
</body></html>
