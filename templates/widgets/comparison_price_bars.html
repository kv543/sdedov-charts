<!DOCTYPE html>
<html lang="he" dir="rtl">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<style>@import url('https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700&display=swap');</style></head>
<body style="margin:0;padding:0;background:transparent;">

<div id="cmpp-container">
  <div id="cmpp-header">
    <div id="cmpp-title-wrap">
      <div id="cmpp-title"></div>
      <div id="cmpp-subtitle"></div>
    </div>
  </div>
  <div id="cmpp-wrap"><canvas id="cmppChart"></canvas></div>
  <div class="cmpp-legend" id="cmpp-legend"></div>
  <div class="cmpp-note" id="cmpp-note"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
(function(){
  const CMP_DATA = {{ data.comparison | tojson }};
  const font = "'Heebo','Arial',sans-serif";

  function hexToRgba(hex, a) {
    const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
    return `rgba(${r},${g},${b},${a})`;
  }
  function fmt2(v){return Number(v).toLocaleString('he-IL', {minimumFractionDigits:2, maximumFractionDigits:2});}

  const c = (CMP_DATA && CMP_DATA.price_by_rooms) ? CMP_DATA.price_by_rooms : null;
  if (!c) return;

  document.getElementById('cmpp-title').textContent    = c.title    || '';
  document.getElementById('cmpp-subtitle').textContent = c.subtitle || '';
  document.getElementById('cmpp-note').textContent     = c.note     || '';

  const leg = document.getElementById('cmpp-legend');
  c.series.forEach(s => {
    const item = document.createElement('div');
    item.className = 'cmpp-legend-item';
    item.innerHTML = '<span class="cmpp-swatch" style="background:'+s.color+'"></span>'
      + '<span><span class="cmpp-leg-name">'+s.name+'</span>'
      + '<span class="cmpp-leg-range">'+(s.range || '')+'</span></span>';
    leg.appendChild(item);
  });

  const datasets = c.series.map(s => ({
    label: s.name,
    data:  s.data,
    backgroundColor:      hexToRgba(s.color, 0.85),
    hoverBackgroundColor: s.color,
    borderRadius:  6,
    borderSkipped: false
  }));

  const labelPlugin = {
    id: 'cmppAboveBar',
    afterDatasetsDraw(chart) {
      const { ctx, data } = chart;
      ctx.save();
      ctx.font = '600 11.5px Heebo,Arial,sans-serif';
      ctx.fillStyle = '#222';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'bottom';
      data.datasets.forEach((ds, di) => {
        const meta = chart.getDatasetMeta(di);
        ds.data.forEach((val, i) => {
          const m = meta.data[i];
          if (!m) return;
          ctx.fillText(fmt2(val), m.x, m.y - 4);
        });
      });
      ctx.restore();
    }
  };

  new Chart(document.getElementById('cmppChart'), {
    type: 'bar',
    plugins: [labelPlugin],
    data: { labels: c.labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      layout: { padding: { top: 26 } },
      animation: { duration: 700, easing: 'easeInOutQuart' },
      plugins: {
        legend: { display: false },
        tooltip: {
          rtl: true,
          callbacks: {
            label: ctx => ' ' + ctx.dataset.label + ': ' + fmt2(ctx.raw) + ' מיליון ש"ח'
          },
          bodyFont:  { family: font },
          titleFont: { family: font }
        }
      },
      scales: {
        x: {
          grid: { display: false },
          ticks: { font: { family: font, size: 13, weight: '600' }, color: '#333' }
        },
        y: {
          grid: { color: '#f0f0f0' },
          beginAtZero: true,
          min: c.yMin ?? 0,
          max: c.yMax,
          ticks: {
            font: { family: font, size: 11 },
            callback: v => v + " מ'"
          }
        }
      }
    }
  });
})();
</script>

<style>
  #cmpp-container {
    width:100%;height:480px;padding:22px 24px 20px;background:#fff;border-radius:14px;
    box-shadow:0 2px 18px rgba(0,0,0,0.07);font-family:'Heebo',Arial,sans-serif;direction:rtl;
    box-sizing:border-box;display:flex;flex-direction:column;
  }
  #cmpp-header {display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;gap:16px;}
  #cmpp-title-wrap {flex:1;text-align:right;}
  #cmpp-title    {font-size:17px;font-weight:700;color:#222;line-height:1.4;}
  #cmpp-subtitle {font-size:13px;color:#777;margin-top:3px;}
  #cmpp-wrap {flex:1;position:relative;min-height:300px;}
  #cmpp-wrap canvas {position:absolute;top:0;left:0;width:100%!important;height:100%!important;}

  .cmpp-legend {display:flex;justify-content:center;gap:24px;margin-top:14px;flex-wrap:wrap;}
  .cmpp-legend-item {display:flex;align-items:center;gap:8px;font-size:13px;color:#444;}
  .cmpp-swatch {width:14px;height:14px;border-radius:3px;flex-shrink:0;}
  .cmpp-leg-name {font-weight:600;color:#1a2e35;}
  .cmpp-leg-range {font-size:11px;color:#999;font-weight:400;margin-right:6px;}
  .cmpp-note {font-size:11px;color:#aaa;font-style:italic;margin-top:10px;text-align:right;line-height:1.5;}
</style>
</body></html>
