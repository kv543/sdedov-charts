<!DOCTYPE html>
<html lang="he" dir="rtl">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<style>@import url('https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700&display=swap');</style></head>
<body style="margin:0;padding:0;background:transparent;">

<div id="cmps-container">
  <div id="cmps-header">
    <div id="cmps-title-wrap">
      <div id="cmps-title"></div>
      <div id="cmps-subtitle"></div>
    </div>
  </div>
  <div id="cmps-tbl-wrap">
    <table id="cmps-table">
      <thead></thead>
      <tbody></tbody>
    </table>
  </div>
  <div class="cmps-note" id="cmps-note"></div>
</div>

<script>
(function(){
  const CMP_DATA = {{ data.comparison | tojson }};
  const s = (CMP_DATA && CMP_DATA.summary) ? CMP_DATA.summary : null;
  if (!s) return;

  document.getElementById('cmps-title').textContent    = s.title    || '';
  document.getElementById('cmps-subtitle').textContent = s.subtitle || '';
  document.getElementById('cmps-note').textContent     = s.note     || '';

  function fmtVal(v, format) {
    if (v === null || v === undefined) return '—';
    if (format === 'shekel')     return (v/1e6).toLocaleString('he-IL',{minimumFractionDigits:2,maximumFractionDigits:2}) + " מ' ₪";
    if (format === 'shekel_int') return v.toLocaleString('he-IL') + ' ₪';
    if (format === 'sqm')        return v.toLocaleString('he-IL') + ' מ"ר';
    return v.toLocaleString('he-IL');
  }

  const compounds = Object.keys(s.compounds);    // ['eshkol','merkaz']
  const tbl   = document.getElementById('cmps-table');
  const thead = tbl.querySelector('thead');
  const tbody = tbl.querySelector('tbody');

  // header
  const trh = document.createElement('tr');
  const thLbl = document.createElement('th');
  thLbl.className = 'cmps-th-label';
  thLbl.textContent = 'אינדיקטור';
  trh.appendChild(thLbl);
  compounds.forEach(ck => {
    const cmp = s.compounds[ck];
    const th  = document.createElement('th');
    th.innerHTML =
      '<div class="cmps-comp-head">' +
        '<span class="cmps-comp-dot" style="background:' + cmp.color + '"></span>' +
        '<span>' + cmp.label + '</span>' +
      '</div>' +
      '<div class="cmps-comp-range">' + (cmp.range || '') + '</div>';
    trh.appendChild(th);
  });
  thead.appendChild(trh);

  // body
  s.rows.forEach(row => {
    const tr = document.createElement('tr');
    const tdLabel = document.createElement('td');
    tdLabel.className = 'cmps-label-col';
    tdLabel.textContent = row.label;
    tr.appendChild(tdLabel);

    const vals = compounds.map(ck => s.compounds[ck].stats[row.key]);
    const max  = Math.max(...vals.map(v => v || 0));
    compounds.forEach((ck, i) => {
      const td = document.createElement('td');
      td.className = 'cmps-num-col';
      const v = vals[i];
      td.textContent = fmtVal(v, row.format);
      if (v === max && max > 0) td.classList.add('cmps-winner');
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
})();
</script>

<style>
  #cmps-container {
    width:100%;min-height:480px;padding:22px 24px 20px;background:#fff;border-radius:14px;
    box-shadow:0 2px 18px rgba(0,0,0,0.07);font-family:'Heebo',Arial,sans-serif;direction:rtl;
    box-sizing:border-box;display:flex;flex-direction:column;
  }
  #cmps-header {display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;gap:16px;}
  #cmps-title-wrap {flex:1;text-align:right;}
  #cmps-title    {font-size:17px;font-weight:700;color:#222;line-height:1.4;}
  #cmps-subtitle {font-size:13px;color:#777;margin-top:3px;}
  #cmps-tbl-wrap {flex:1;overflow-x:auto;}
  #cmps-table {width:100%;border-collapse:collapse;font-size:14px;direction:rtl;font-family:'Heebo',Arial,sans-serif;}
  #cmps-table th {padding:12px 14px;text-align:right;font-weight:600;color:#1a2e35;background:#f7fbfc;border-bottom:2px solid #d0dfe2;font-size:13px;}
  #cmps-table .cmps-th-label {color:#496970;}
  #cmps-table td {padding:11px 14px;text-align:right;color:#333;border-bottom:1px solid #eef2f3;}
  #cmps-table tbody tr:hover {background:#f9fcfd;}
  #cmps-table .cmps-label-col {font-weight:500;color:#496970;}
  #cmps-table .cmps-num-col   {font-variant-numeric:tabular-nums;font-weight:600;}
  #cmps-table .cmps-winner    {color:#1a2e35;}
  #cmps-table .cmps-winner::after {content:" ★";color:#61C0CC;font-size:11px;}
  .cmps-comp-head {display:flex;align-items:center;gap:8px;justify-content:flex-end;}
  .cmps-comp-dot  {width:11px;height:11px;border-radius:50%;}
  .cmps-comp-range {font-size:11px;color:#999;font-weight:400;margin-top:3px;text-align:left;}
  .cmps-note {font-size:11px;color:#aaa;font-style:italic;margin-top:14px;text-align:right;line-height:1.5;}
</style>
</body></html>
