<!DOCTYPE html>
<html lang="he" dir="rtl">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<style>@import url('https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;700&display=swap');</style></head>
<body style="margin:0;padding:0;background:transparent;">

<div id="pr-container">
  <div id="pr-header">
    <div id="pr-title-wrap">
      <div id="pr-title">כמות דירות שנמכרו לפי טווח מחיר</div>
      <div id="pr-subtitle">ללא עסקאות אופציה</div>
    </div>
  </div>
  <div id="pr-chart-wrap"><canvas id="prChart"></canvas></div>
  <div id="pr-tabs">
    <button class="pr-tab active" data-filter="all">הכל</button>
    <button class="pr-tab" data-filter="8">8 רבעונים</button>
    <button class="pr-tab" data-filter="4">4 רבעונים</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
(function(){
  const PR_DATA = {{ data.price_ranges | tojson }};
  const font    = "'Heebo','Arial',sans-serif";
  function hexToRgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
  let inst=null, filter='all';
  function getFiltered(){
    if(filter==='all')return{labels:PR_DATA.cheap.labels,cheap:PR_DATA.cheap.data,exp:PR_DATA.expensive.data};
    const n=parseInt(filter);
    return{labels:PR_DATA.cheap.labels.slice(-n),cheap:PR_DATA.cheap.data.slice(-n),exp:PR_DATA.expensive.data.slice(-n)};
  }
  function render(){
    const fd=getFiltered();
    if(inst){
      inst.data.labels=fd.labels;
      inst.data.datasets[0].data=fd.cheap;
      inst.data.datasets[1].data=fd.exp;
      inst.update();
    } else {
      inst=new Chart(document.getElementById('prChart'),{
        type:'line',
        data:{labels:fd.labels,datasets:[
          {label:'מחיר נמוך מ-4 מיליון ש"ח',data:fd.cheap,borderColor:'#61C0CC',backgroundColor:hexToRgba('#61C0CC',0.08),borderWidth:2.5,pointRadius:3,pointHoverRadius:6,pointBackgroundColor:'#61C0CC',tension:0.3,fill:true},
          {label:'מחיר גבוה מ-10 מיליון ש"ח',data:fd.exp,borderColor:'#496970',backgroundColor:hexToRgba('#496970',0.06),borderWidth:2.5,pointRadius:3,pointHoverRadius:6,pointBackgroundColor:'#496970',tension:0.3,fill:true}
        ]},
        options:{
          responsive:true,maintainAspectRatio:false,animation:{duration:600},
          plugins:{
            legend:{display:true,position:'bottom',rtl:true,labels:{font:{family:font,size:13},padding:20,usePointStyle:true,pointStyle:'circle',boxWidth:8,boxHeight:8}},
            title:{display:false},
            tooltip:{rtl:true,callbacks:{label:ctx=>' '+ctx.raw+' דירות — '+ctx.dataset.label},bodyFont:{family:font},titleFont:{family:font}}
          },
          scales:{
            x:{grid:{color:'#f0f0f0'},ticks:{font:{family:font,size:10},maxRotation:45,minRotation:45}},
            y:{grid:{color:'#f0f0f0'},beginAtZero:true,ticks:{font:{family:font,size:11}}}
          }
        }
      });
    }
  }
  render();
  document.querySelectorAll('.pr-tab').forEach(btn=>btn.addEventListener('click',function(){
    filter=this.dataset.filter;
    document.querySelectorAll('.pr-tab').forEach(b=>b.classList.remove('active'));
    this.classList.add('active');render();
  }));
})();
</script>

<style>
  #pr-container{width:100%;min-height:480px;padding:22px 24px 20px;background:#fff;border-radius:14px;
    box-shadow:0 2px 18px rgba(0,0,0,0.07);font-family:'Heebo',Arial,sans-serif;direction:rtl;
    box-sizing:border-box;display:flex;flex-direction:column;}
  #pr-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;gap:16px;}
  #pr-title-wrap{flex:1;text-align:right;}
  #pr-title{font-size:17px;font-weight:700;color:#222;line-height:1.4;}
  #pr-subtitle{font-size:13px;color:#777;margin-top:3px;}
  #pr-chart-wrap{flex:1;position:relative;min-height:260px;}
  #pr-chart-wrap canvas{position:absolute;top:0;left:0;width:100%!important;height:100%!important;}
  #pr-tabs{display:flex;justify-content:center;gap:16px;margin-top:12px;}
  .pr-tab{padding:3px 8px;border:none !important;background:none !important;color:#aaa;font-family:'Heebo',Arial,sans-serif;
    font-size:13px;cursor:pointer;border-radius:4px;outline:none;-webkit-appearance:none;appearance:none;box-shadow:none !important;}
  .pr-tab.active{color:#61C0CC !important;text-decoration:underline !important;font-weight:600;background:none !important;border:none !important;box-shadow:none !important;}
  .pr-tab:hover:not(.active){color:#555;background:#f0f0f0 !important;}
</style>
</body></html>
