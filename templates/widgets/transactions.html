<!DOCTYPE html>
<html lang="he" dir="rtl">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<style>@import url('https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;700&display=swap');</style></head>
<body style="margin:0;padding:0;background:transparent;">

<div id="tbl-container">
  <div id="tbl-header">
    <div id="tbl-title-wrap">
      <div id="tbl-title"></div>
      <div id="tbl-subtitle">ללא עסקאות אופציה</div>
    </div>
    <select id="tbl-select">
      <option value="expensive">עסקאות יקרות ביותר</option>
      <option value="cheap">עסקאות זולות ביותר</option>
    </select>
  </div>
  <div id="tbl-loading">טוען נתונים...</div>
  <div id="tbl-error"></div>
  <div id="tbl-wrap" style="display:none">
    <table id="tbl-main">
      <thead><tr>
        <th data-sort="date" class="sortable">תאריך</th>
        <th>מתחם</th>
        <th data-sort="price" class="sortable">מחיר</th>
        <th>שטח</th>
        <th>חדרים</th>
        <th>שנת בנייה</th>
        <th data-sort="ppm" class="sortable">מחיר למ"ר</th>
      </tr></thead>
      <tbody id="tbl-body"></tbody>
    </table>
  </div>
</div>

<script>
const TBL_DATA = {{ data.transactions | tojson }};

(function() {
  const TABLE_TITLES = {
    expensive: "10 העסקאות היקרות ביותר בשדה דב",
    cheap:     "10 העסקאות הזולות ביותר בשדה דב"
  };
  const MONTHS_HE = {ינואר:1,פברואר:2,מרץ:3,אפריל:4,מאי:5,יוני:6,יולי:7,אוגוסט:8,ספטמבר:9,אוקטובר:10,נובמבר:11,דצמבר:12};

  let TABLE_CURRENT_KEY = "expensive";
  let TABLE_SORT_COL    = "price";
  let TABLE_SORT_DIR    = "desc";

  function dateToNum(dateStr) {
    const parts = dateStr.trim().split(" ");
    const day   = parseInt(parts[0]) || 0;
    const month = MONTHS_HE[parts[1].replace("ב", "")] || 0;
    const year  = parseInt(parts[2]) || 0;
    return year * 10000 + month * 100 + day;
  }
  function formatDateShort(dateStr) {
    const parts = dateStr.trim().split(" ");
    const day   = parseInt(parts[0]) || 0;
    const month = MONTHS_HE[parts[1].replace("ב", "")] || 0;
    const year  = parseInt(parts[2]) || 0;
    return day + "." + month + "." + String(year).slice(-2);
  }
  function fmtPrice(val) {
    const m = val / 1000000;
    return m.toLocaleString("he-IL", {minimumFractionDigits:2, maximumFractionDigits:2}) + " מ' ₪";
  }
  function fmtPpm(val) {
    return "₪" + val.toLocaleString("he-IL");
  }
  function getSorted(rows) {
    if (!TABLE_SORT_COL) return [...rows];
    return [...rows].sort((a, b) => {
      let va, vb;
      if (TABLE_SORT_COL === "date")  { va = dateToNum(a.date);  vb = dateToNum(b.date); }
      if (TABLE_SORT_COL === "price") { va = a.price;  vb = b.price; }
      if (TABLE_SORT_COL === "ppm")   { va = a.ppm;    vb = b.ppm; }
      return TABLE_SORT_DIR === "asc" ? va - vb : vb - va;
    });
  }
  function updateSortHeaders() {
    document.querySelectorAll("#tbl-main th.sortable").forEach(th => {
      const col = th.dataset.sort;
      const arrow = th.querySelector(".sort-arrow");
      if (arrow) arrow.remove();
      if (col === TABLE_SORT_COL) {
        const span = document.createElement("span");
        span.className = "sort-arrow";
        span.textContent = TABLE_SORT_DIR === "asc" ? " ↑" : " ↓";
        th.appendChild(span);
      }
    });
  }
  function renderTable(key) {
    document.getElementById("tbl-title").textContent = TABLE_TITLES[key];
    const rows = getSorted(TBL_DATA[key]);
    const tbody = document.getElementById("tbl-body");
    tbody.innerHTML = "";
    rows.forEach((r, i) => {
      const tr = document.createElement("tr");
      tr.className = i % 2 === 0 ? "row-even" : "row-odd";
      tr.innerHTML =
        `<td>${formatDateShort(r.date)}</td>` +
        `<td>${r.complex}</td>` +
        `<td class="num">${fmtPrice(r.price)}</td>` +
        `<td class="num">${r.sqm} מ"ר</td>` +
        `<td class="num">${r.rooms}</td>` +
        `<td class="num">${r.build_year}</td>` +
        `<td class="num">${fmtPpm(r.ppm)}</td>`;
      tbody.appendChild(tr);
    });
    updateSortHeaders();
  }

  /* נתונים אפויים — מסתירים spinner ומציגים טבלה מיד */
  document.getElementById("tbl-loading").style.display = "none";
  document.getElementById("tbl-wrap").style.display    = "block";
  renderTable(TABLE_CURRENT_KEY);

  document.getElementById("tbl-select").addEventListener("change", function() {
    const key = this.value;
    if (key === TABLE_CURRENT_KEY) return;
    TABLE_CURRENT_KEY = key;
    TABLE_SORT_COL = "price";
    TABLE_SORT_DIR = key === "cheap" ? "asc" : "desc";
    renderTable(key);
  });

  document.querySelectorAll("#tbl-main th.sortable").forEach(th => {
    th.addEventListener("click", function() {
      const col = this.dataset.sort;
      if (TABLE_SORT_COL === col) {
        TABLE_SORT_DIR = TABLE_SORT_DIR === "asc" ? "desc" : "asc";
      } else {
        TABLE_SORT_COL = col;
        TABLE_SORT_DIR = "asc";
      }
      renderTable(TABLE_CURRENT_KEY);
    });
  });
})();
</script>

<style>
  #tbl-container {
    width: 100%;
    min-width: 0;
    overflow-x: hidden;
    min-height: 480px;
    padding: 22px 24px 20px;
    background: #fff;
    border-radius: 14px;
    box-shadow: 0 2px 18px rgba(0,0,0,0.07);
    font-family: 'Heebo', Arial, sans-serif;
    direction: rtl;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
  }
  #tbl-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 16px;
    gap: 16px;
  }
  #tbl-title-wrap { flex: 1; text-align: right; }
  #tbl-title {
    font-family: 'Heebo', Arial, sans-serif;
    font-size: 17px;
    font-weight: 700;
    color: #222;
    line-height: 1.4;
  }
  #tbl-subtitle {
    font-family: 'Heebo', Arial, sans-serif;
    font-size: 13px;
    font-weight: 400;
    color: #777;
    margin-top: 3px;
  }
  #tbl-select {
    flex: 0 0 auto;
    width: auto;
    max-width: 200px;
    padding: 7px 12px;
    border: 2px solid #ddd;
    border-radius: 8px;
    background: #fff;
    color: #444;
    font-family: 'Heebo', Arial, sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    outline: none;
    transition: border-color 0.2s;
    direction: rtl;
    appearance: auto;
    -webkit-appearance: auto;
  }
  #tbl-select:hover,
  #tbl-select:focus { border-color: #61C0CC; }

  #tbl-wrap {
    overflow-x: auto;
    overflow-y: auto;
    flex: 1;
    max-height: 360px;
    width: 100%;
    min-width: 0;
  }
  #tbl-main {
    width: 100%;
    border-collapse: collapse;
    font-family: 'Heebo', Arial, sans-serif;
    font-size: 13px;
    direction: rtl;
  }
  #tbl-main thead tr { background: #496970; color: #fff; }
  #tbl-main th {
    padding: 10px 12px;
    text-align: right;
    font-weight: 600;
    font-size: 13px;
    white-space: nowrap;
  }
  #tbl-main th.sortable { cursor: pointer; user-select: none; }
  #tbl-main th.sortable:hover { background: #3d5860; }
  .sort-arrow { font-size: 11px; opacity: 0.9; }
  #tbl-main td {
    padding: 9px 12px;
    text-align: right;
    color: #333;
    white-space: nowrap;
  }
  #tbl-main td.num { font-variant-numeric: tabular-nums; }
  #tbl-main tr.row-even { background: #fff; }
  #tbl-main tr.row-odd  { background: #f4f9fa; }
  #tbl-main tbody tr:hover { background: #e8f5f7; }

  #tbl-loading {
    text-align: center;
    padding: 40px;
    color: #888;
    font-family: 'Heebo', Arial, sans-serif;
    font-size: 15px;
  }
  #tbl-loading::before {
    content: "";
    display: block;
    width: 34px;
    height: 34px;
    border: 3px solid #e0e0e0;
    border-top-color: #496970;
    border-radius: 50%;
    animation: spin4 0.8s linear infinite;
    margin: 0 auto 12px;
  }
  #tbl-error {
    display: none;
    text-align: center;
    padding: 20px;
    color: #e53e3e;
    background: #fff5f5;
    border-radius: 8px;
    font-family: 'Heebo', Arial, sans-serif;
    font-size: 14px;
  }
  @keyframes spin4 { to { transform: rotate(360deg); } }

  @media (max-width: 1200px) {
    #tbl-main { font-size: 11px; }
    #tbl-main th { padding: 8px 7px; font-size: 11px; }
    #tbl-main td { padding: 7px 7px; }
    #tbl-main th:nth-child(6),
    #tbl-main td:nth-child(6) { display: none; }
  }
</style>
</body></html>
