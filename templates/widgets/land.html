<!DOCTYPE html>
<html lang="he" dir="rtl">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<style>@import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap');</style></head>
<body style="margin:0;padding:0;background:transparent;">
<div id="lc-root">
  <div id="lc-header">
    <div id="lc-title-group">
      <div id="lc-title">עלות קרקע ליחידת דיור</div>
      <div id="lc-subtitle">התפתחות מחיר הקרקע הממוצע ליח"ד במכרזי שדה דב לפי תאריך סגירת מכרז</div>
    </div>
    <div id="lc-toggle-group">
      <span class="lc-tlabel" id="lc-tlabel-avg">ממוצע בלבד</span>
      <label class="lc-switch">
        <input type="checkbox" id="lc-toggle" checked>
        <span class="lc-slider"></span>
      </label>
      <span class="lc-tlabel active" id="lc-tlabel-range">ממוצע + טווח</span>
    </div>
  </div>
  <div id="lc-chart-area">
    <div id="lc-chart-wrap">
      <canvas id="lcChart"></canvas>
      <div id="lc-tooltip"><div id="lc-tt-inner"></div></div>
    </div>
  </div>
  <div id="lc-footer">
    <div id="lc-legend">
      <div class="lc-leg-item">
        <svg width="28" height="10" viewBox="0 0 28 10"><line x1="0" y1="5" x2="28" y2="5" stroke="#496970" stroke-width="2.5"/><circle cx="14" cy="5" r="4" fill="#fff" stroke="#496970" stroke-width="2.5"/></svg>
        <span>מחיר ממוצע לקרקע ליח"ד</span>
      </div>
      <div class="lc-leg-item" id="lc-leg-range">
        <svg width="28" height="14" viewBox="0 0 28 14"><rect x="0" y="2" width="28" height="10" rx="2" fill="rgba(73,105,112,0.18)"/></svg>
        <span>טווח הצעות זוכים</span>
      </div>
    </div>
    <div id="lc-note">* הטווח מייצג את הפיזור בין הצעות הזוכים בכל מכרז</div>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
const LC_DATA   = {{ data.land_chart.tenders | tojson }};
const LC_COLOR  = '#496970';
const LC_COLOR2 = 'rgba(73,105,112,0.16)';
const LC_FONT   = "'Heebo', Arial, sans-serif";

function fmtM(n){return (n/1_000_000).toLocaleString('he-IL',{minimumFractionDigits:2,maximumFractionDigits:2})+' מ\' ₪';}

const lcVertLinePlugin={id:'lcVertLine',afterDraw(chart){
  if(!chart.tooltip._active||!chart.tooltip._active.length)return;
  const ctx=chart.ctx,x=chart.tooltip._active[0].element.x;
  ctx.save();ctx.beginPath();ctx.moveTo(x,chart.scales.y.top);ctx.lineTo(x,chart.scales.y.bottom);
  ctx.setLineDash([5,4]);ctx.lineWidth=1.2;ctx.strokeStyle='rgba(73,105,112,0.35)';ctx.stroke();ctx.restore();
}};

const canvas=document.getElementById('lcChart');
function externalTooltip(context){
  const ttEl=document.getElementById('lc-tooltip'),inner=document.getElementById('lc-tt-inner');
  if(context.tooltip.opacity===0){ttEl.classList.remove('visible');return;}
  const idx=context.tooltip.dataPoints[0].dataIndex,t=LC_DATA[idx];
  const hasRange=(t.min!==t.max),showRange=document.getElementById('lc-toggle').checked;
  inner.innerHTML=`
    <div class="lc-tt-head">
      <span class="lc-tt-tender">מכרז ${t.tender}</span>
      <span class="lc-tt-date">${t.date}</span>
    </div>
    <div class="lc-tt-area">מתחם <strong>${t.area}</strong></div>
    <div class="lc-tt-divider"></div>
    <div class="lc-tt-row lc-tt-main"><span>מחיר ממוצע</span><strong>${fmtM(t.avg)}</strong></div>
    ${showRange&&hasRange?`
    <div class="lc-tt-row"><span>מינימום</span><span>${fmtM(t.min)}</span></div>
    <div class="lc-tt-row"><span>מקסימום</span><span>${fmtM(t.max)}</span></div>`
    :showRange&&!hasRange?`<div class="lc-tt-row lc-tt-single"><span>זוכה יחיד</span></div>`:''}
    <div class="lc-tt-divider"></div>
    <div class="lc-tt-row lc-tt-winners"><span>מספר זוכים</span><span class="lc-tt-badge">${t.winners}</span></div>`;
  const canvasW=canvas.offsetWidth,ttW=210;
  let left=context.tooltip.caretX;
  left=(left+ttW+20>canvasW)?left-ttW-14:left+14;
  ttEl.style.left=left+'px';ttEl.style.top=Math.max(0,context.tooltip.caretY-30)+'px';
  ttEl.classList.add('visible');
}

const lcChart=new Chart(canvas,{
  type:'line',plugins:[lcVertLinePlugin],
  data:{labels:LC_DATA.map(d=>d.xLabel),datasets:[
    {label:'_max',data:LC_DATA.map(d=>d.max),borderColor:'transparent',backgroundColor:LC_COLOR2,borderWidth:0,pointRadius:0,pointHoverRadius:0,fill:1,tension:0.42,order:3},
    {label:'_min',data:LC_DATA.map(d=>d.min),borderColor:'transparent',backgroundColor:'transparent',borderWidth:0,pointRadius:0,pointHoverRadius:0,fill:false,tension:0.42,order:3},
    {label:'ממוצע',data:LC_DATA.map(d=>d.avg),borderColor:LC_COLOR,backgroundColor:LC_COLOR,borderWidth:2.5,pointRadius:7,pointHoverRadius:10,pointBackgroundColor:'#fff',pointBorderColor:LC_COLOR,pointBorderWidth:2.5,pointHoverBackgroundColor:LC_COLOR,pointHoverBorderColor:'#fff',pointHoverBorderWidth:3,fill:false,tension:0.42,order:1}
  ]},
  options:{responsive:true,maintainAspectRatio:false,animation:{duration:700,easing:'easeInOutQuart'},
    interaction:{mode:'index',intersect:false},
    plugins:{legend:{display:false},tooltip:{enabled:false,external:externalTooltip}},
    scales:{
      x:{grid:{color:'#f0f0f0',lineWidth:1},border:{display:false},ticks:{font:{family:LC_FONT,size:12},color:'#555',padding:8}},
      y:{grid:{color:'#f0f0f0',lineWidth:1},border:{display:false},min:1400000,ticks:{font:{family:LC_FONT,size:11},color:'#888',padding:10,callback:v=>(v/1e6).toFixed(1)+' מ\' ₪'}}
    }}
});

document.getElementById('lc-toggle').addEventListener('change',function(){
  const on=this.checked;
  lcChart.data.datasets[0].backgroundColor=on?LC_COLOR2:'transparent';
  lcChart.data.datasets[0].fill=on?1:false;
  document.getElementById('lc-leg-range').style.opacity=on?'1':'0.35';
  document.getElementById('lc-tlabel-range').classList.toggle('active',on);
  document.getElementById('lc-tlabel-avg').classList.toggle('active',!on);
  lcChart.update();
});
</script>
<style>
  #lc-root{width:100%;padding:26px 28px 20px;background:#fff;border-radius:16px;
    box-shadow:0 2px 20px rgba(0,0,0,0.07);font-family:'Heebo',Arial,sans-serif;
    direction:rtl;box-sizing:border-box;position:relative;}
  #lc-header{display:flex;align-items:flex-start;justify-content:space-between;gap:20px;margin-bottom:24px;flex-wrap:wrap;}
  #lc-title{font-size:19px;font-weight:700;color:#1a2e35;line-height:1.3;}
  #lc-subtitle{font-size:13px;color:#888;margin-top:4px;line-height:1.5;}
  #lc-toggle-group{display:flex;align-items:center;gap:9px;flex-shrink:0;margin-top:2px;}
  .lc-tlabel{font-size:12.5px;color:#aaa;cursor:pointer;transition:color .2s;white-space:nowrap;}
  .lc-tlabel.active{color:#496970;font-weight:600;}
  .lc-switch{position:relative;display:inline-block;width:40px;height:22px;flex-shrink:0;}
  .lc-switch input{opacity:0;width:0;height:0;}
  .lc-slider{position:absolute;inset:0;background:#d0dde0;border-radius:22px;cursor:pointer;transition:background .25s;}
  .lc-slider::before{content:'';position:absolute;width:16px;height:16px;left:3px;top:3px;
    background:#fff;border-radius:50%;transition:transform .25s;box-shadow:0 1px 4px rgba(0,0,0,.2);}
  .lc-switch input:checked + .lc-slider{background:#496970;}
  .lc-switch input:checked + .lc-slider::before{transform:translateX(18px);}
  #lc-chart-area{position:relative;}
  #lc-chart-wrap{width:100%;height:240px;position:relative;}
  #lc-chart-wrap canvas{position:absolute;top:0;left:0;right:0;bottom:0;width:100%!important;height:100%!important;}
  #lc-tooltip{position:absolute;pointer-events:none;opacity:0;transition:opacity .15s;z-index:10;}
  #lc-tooltip.visible{opacity:1;}
  #lc-tt-inner{background:#fff;border:1px solid #e4ecee;border-radius:12px;padding:12px 14px;
    box-shadow:0 6px 24px rgba(73,105,112,.14);width:210px;font-family:'Heebo',Arial,sans-serif;direction:rtl;}
  .lc-tt-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
  .lc-tt-tender{font-size:13px;font-weight:700;color:#1a2e35;}
  .lc-tt-date{font-size:11px;color:#aaa;direction:ltr;}
  .lc-tt-area{font-size:12px;color:#777;margin-bottom:8px;}
  .lc-tt-area strong{color:#496970;}
  .lc-tt-divider{height:1px;background:#eef2f3;margin:7px 0;}
  .lc-tt-row{display:flex;justify-content:space-between;align-items:center;font-size:12.5px;color:#555;margin:4px 0;}
  .lc-tt-main{font-size:13.5px;color:#222;}
  .lc-tt-main strong{color:#496970;font-weight:700;}
  .lc-tt-single{color:#999;font-size:12px;font-style:italic;}
  .lc-tt-winners{color:#444;}
  .lc-tt-badge{background:#eaf4f5;color:#496970;font-weight:700;font-size:12px;border-radius:20px;padding:2px 10px;}
  #lc-footer{display:flex;align-items:center;justify-content:space-between;margin-top:16px;flex-wrap:wrap;gap:10px;}
  #lc-legend{display:flex;align-items:center;gap:20px;}
  .lc-leg-item{display:flex;align-items:center;gap:7px;font-size:12px;color:#555;transition:opacity .25s;}
  #lc-leg-range{opacity:1;}
  #lc-note{font-size:11px;color:#bbb;font-style:italic;text-align:left;}
  @media(max-width:600px){
    #lc-root{padding:14px 6px 10px;}
    #lc-chart-wrap{height:200px;}
    #lc-header{flex-direction:column;gap:12px;}
    #lc-footer{flex-direction:column;align-items:flex-start;}
  }
</style>
</body></html>
